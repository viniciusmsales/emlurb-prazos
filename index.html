<!DOCTYPE html>
<!-- v5 -->
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EMLURB – Prazos Processuais</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f2f5;color:#333;font-size:14px}
header{background:#1a3a6b;color:#fff;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
header h1{font-size:18px;font-weight:700;letter-spacing:.5px}
.hbts{display:flex;gap:6px;flex-wrap:wrap}
.hbt{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.3);padding:6px 12px;border-radius:6px;cursor:pointer;font-size:13px}
.hbt:hover{background:rgba(255,255,255,.25)}
.tabs{background:#fff;border-bottom:2px solid #e0e0e0;display:flex;padding:0 20px}
.tab{padding:12px 20px;cursor:pointer;font-size:13px;font-weight:600;color:#666;border-bottom:3px solid transparent;margin-bottom:-2px}
.tab.active{color:#1a3a6b;border-bottom-color:#1a3a6b}
.tab:hover{color:#1a3a6b}
main{padding:16px 20px;max-width:1200px;margin:0 auto}
/* Dashboard */
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:20px}
.kpi{background:#fff;border-radius:8px;padding:16px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.kpi .val{font-size:32px;font-weight:700;color:#1a3a6b}
.kpi .lbl{font-size:12px;color:#888;margin-top:4px}
.section-title{font-size:15px;font-weight:700;color:#1a3a6b;margin:16px 0 10px}
.hon-card{background:#fff3cd;border:1px solid #ffc107;border-radius:8px;padding:12px 16px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.hon-card .proc{font-weight:600;font-size:13px}
.hon-card .parte{font-size:12px;color:#555}
.hon-card button{background:#ffc107;color:#333;border:none;padding:5px 12px;border-radius:5px;cursor:pointer;font-size:12px;font-weight:600}
/* Lista */
.toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;align-items:center}
.toolbar input{flex:1;min-width:160px;padding:7px 12px;border:1px solid #ccc;border-radius:6px;font-size:13px}
.toolbar select{padding:7px 10px;border:1px solid #ccc;border-radius:6px;font-size:13px;background:#fff}
.btn{padding:7px 14px;border-radius:6px;border:none;cursor:pointer;font-size:13px;font-weight:600}
.btn-primary{background:#1a3a6b;color:#fff}
.btn-primary:hover{background:#15306a}
.btn-success{background:#28a745;color:#fff}
.btn-success:hover{background:#218838}
.btn-danger{background:#dc3545;color:#fff}
.btn-danger:hover{background:#c82333}
.btn-warn{background:#fd7e14;color:#fff}
.btn-warn:hover{background:#e96b00}
table{width:100%;border-collapse:collapse;background:#fff;border-radius:8px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.08)}
thead{background:#1a3a6b;color:#fff}
th{padding:10px 10px;text-align:left;font-size:12px;font-weight:600;white-space:nowrap}
td{padding:9px 10px;font-size:12px;border-bottom:1px solid #f0f0f0;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#f8f9fa}
.badge{display:inline-block;padding:3px 8px;border-radius:12px;font-size:11px;font-weight:700;white-space:nowrap}
.pb-azul{background:#cfe2ff;color:#084298}
.pb-verde{background:#d1e7dd;color:#0f5132}
.pb-amarelo{background:#fff3cd;color:#664d03}
.pb-laranja{background:#ffe5d0;color:#7d3a00}
.pb-vermelho{background:#f8d7da;color:#842029}
.pb-vencido{background:#e2e3e5;color:#41464b}
.pb-suspenso{background:#d3d3f8;color:#2d2d8c}
.acoes{display:flex;gap:4px;flex-wrap:nowrap}
.acoes button{padding:4px 8px;border:none;border-radius:4px;cursor:pointer;font-size:11px;font-weight:600}
.bt-ed{background:#e9ecef;color:#495057}
.bt-ed:hover{background:#dee2e6}
.bt-ok{background:#d1e7dd;color:#0f5132}
.bt-ok:hover{background:#badbcc}
.bt-del{background:#f8d7da;color:#842029}
.bt-del:hover{background:#f5c2c7}
/* Modal */
.overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:1000;align-items:center;justify-content:center}
.overlay.open{display:flex}
.modal{background:#fff;border-radius:10px;padding:24px;width:100%;max-width:540px;max-height:90vh;overflow-y:auto;position:relative}
.modal h2{font-size:16px;font-weight:700;color:#1a3a6b;margin-bottom:16px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.form-full{grid-column:1/-1}
label{display:block;font-size:12px;font-weight:600;color:#555;margin-bottom:3px}
input,select,textarea{width:100%;padding:7px 10px;border:1px solid #ccc;border-radius:5px;font-size:13px;font-family:inherit}
textarea{resize:vertical;min-height:60px}
.form-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
.close-btn{position:absolute;top:12px;right:16px;background:none;border:none;font-size:20px;cursor:pointer;color:#888;line-height:1}
.empty{text-align:center;padding:40px;color:#999;font-size:13px}
.tag-suspenso{text-decoration:line-through;opacity:.7}
/* Filtro urgência */
.filt-badge{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:12px;cursor:pointer;border:2px solid transparent;font-size:12px;font-weight:600}
.filt-badge.sel{border-color:#1a3a6b}
</style>
</head>
<body>

<header>
  <h1>⚖ EMLURB – Prazos Processuais</h1>
  <div class="hbts">
    <button class="hbt" onclick="abrirModal(null)">+ Novo Processo</button>
    <button class="hbt" onclick="exportar()">↓ Exportar</button>
    <label class="hbt" style="cursor:pointer">↑ Importar<input type="file" accept=".json" style="display:none" onchange="importar(event)"></label>
  </div>
</header>

<div class="tabs">
  <div class="tab active" id="tab-dash" onclick="tab('dash')">Dashboard</div>
  <div class="tab" id="tab-lista" onclick="tab('lista')">Processos</div>
</div>

<main>
  <!-- DASHBOARD -->
  <div id="view-dash">
    <div class="kpis" id="kpis"></div>
    <div id="hon-section"></div>
  </div>

  <!-- LISTA -->
  <div id="view-lista" style="display:none">
    <div class="toolbar">
      <input type="text" id="busca" placeholder="Buscar processo, SEI, parte…" oninput="renderLista()">
      <select id="filtStatus" onchange="renderLista()">
        <option value="">Todos os status</option>
        <option value="ativo">Ativo</option>
        <option value="suspenso">Suspenso/Cumprido</option>
        <option value="encerrado">Encerrado</option>
      </select>
      <select id="filtUrgencia" onchange="renderLista()">
        <option value="">Todas urgências</option>
        <option value="pb-vencido">Vencido</option>
        <option value="pb-vermelho">0–2 dias</option>
        <option value="pb-laranja">3–5 dias</option>
        <option value="pb-amarelo">6–8 dias</option>
        <option value="pb-verde">9–12 dias</option>
        <option value="pb-azul">&gt;12 dias</option>
        <option value="pb-suspenso">Suspenso</option>
      </select>
    </div>
    <div id="lista-container"></div>
  </div>
</main>

<!-- MODAL -->
<div class="overlay" id="overlay">
  <div class="modal">
    <button class="close-btn" onclick="fecharModal()">×</button>
    <h2 id="modal-titulo">Processo</h2>
    <form onsubmit="salvar(event)">
      <div class="form-grid">
        <div class="form-full">
          <label>Nº Processo *</label>
          <input type="text" id="fProc" required placeholder="0000000-00.0000.0.00.0000">
        </div>
        <div>
          <label>Nº SEI</label>
          <input type="text" id="fSEI" placeholder="SEI-040...">
        </div>
        <div>
          <label>Parte Contrária</label>
          <input type="text" id="fParte" placeholder="Nome da parte">
        </div>
        <div>
          <label>Data da Intimação/Citação</label>
          <input type="date" id="fDisp">
        </div>
        <div>
          <label>Prazo (dias úteis)</label>
          <input type="number" id="fPrazo" min="1" max="365" placeholder="15">
        </div>
        <div>
          <label>Tipo de prazo</label>
          <select id="fTipo">
            <option value="uteis">Dias Úteis (Art.219 CPC)</option>
            <option value="corridos">Dias Corridos</option>
          </select>
        </div>
        <div>
          <label>Status</label>
          <select id="fStatus">
            <option value="ativo">Ativo</option>
            <option value="suspenso">Suspenso/Cumprido</option>
            <option value="encerrado">Encerrado</option>
          </select>
        </div>
        <div class="form-full">
          <label>O que fazer / Ação</label>
          <input type="text" id="fAcao" placeholder="Ex: Protocolar contestação">
        </div>
        <div class="form-full">
          <label>Resultado (êxito / derrota)</label>
          <select id="fResultado">
            <option value="">Em andamento</option>
            <option value="exito">Êxito</option>
            <option value="derrota">Derrota</option>
            <option value="acordo">Acordo</option>
            <option value="extinto">Extinto</option>
          </select>
        </div>
        <div class="form-full">
          <label><input type="checkbox" id="fHon" style="width:auto;margin-right:6px">Honorários de êxito pendentes</label>
        </div>
        <div class="form-full">
          <label>Observações</label>
          <textarea id="fObs" rows="3" placeholder="Notas adicionais…"></textarea>
        </div>
      </div>
      <div class="form-btns">
        <button type="button" class="btn" onclick="fecharModal()" style="background:#e9ecef;color:#333">Cancelar</button>
        <button type="submit" class="btn btn-primary">Salvar</button>
      </div>
    </form>
  </div>
</div>

<script>
window.onerror = function(msg, src, line, col, err) {
  var div = document.createElement('div');
  div.style.cssText = 'position:fixed;top:0;left:0;right:0;background:#f8d7da;color:#842029;padding:12px;font-family:monospace;font-size:13px;z-index:9999;border-bottom:2px solid #842029';
  div.textContent = 'ERRO JS (linha ' + line + '): ' + msg;
  document.body.appendChild(div);
  return false;
};
// ============================================================
// FERIADOS TJPE 2025 + 2026 (Art.219 CPC)
// ============================================================
var FER = {
  "2025-01-01":1,"2025-03-03":1,"2025-03-04":1,"2025-03-05":1,
  "2025-04-18":1,"2025-04-19":1,"2025-04-21":1,"2025-05-01":1,
  "2025-06-19":1,"2025-07-16":1,"2025-08-15":1,"2025-09-07":1,
  "2025-10-12":1,"2025-11-02":1,"2025-11-15":1,"2025-11-20":1,
  "2025-12-08":1,"2025-12-24":1,"2025-12-25":1,"2025-12-31":1,
  "2026-01-01":1,"2026-02-16":1,"2026-02-17":1,"2026-02-18":1,
  "2026-04-03":1,"2026-04-04":1,"2026-04-21":1,"2026-05-01":1,
  "2026-06-04":1,"2026-07-16":1,"2026-08-15":1,"2026-09-07":1,
  "2026-10-12":1,"2026-11-02":1,"2026-11-15":1,"2026-11-20":1,
  "2026-12-08":1,"2026-12-24":1,"2026-12-25":1,"2026-12-31":1
};

// ============================================================
// UTILITÁRIOS DE DATA
// ============================================================
function pad(n){ return n < 10 ? '0' + n : '' + n; }

function dISO(d){
  return d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate());
}

function parseISO(s){
  if(!s) return null;
  var p = s.split('-');
  return new Date(parseInt(p[0]), parseInt(p[1])-1, parseInt(p[2]));
}

function isUtil(d){
  var w = d.getDay();
  return w !== 0 && w !== 6 && !FER[dISO(d)];
}

function proxUtil(d){
  var r = new Date(d.getTime());
  while(!isUtil(r)) r.setDate(r.getDate()+1);
  return r;
}

function calcFinal(dispISO, prazo, tipo){
  if(!dispISO || !prazo) return '';
  var d = parseISO(dispISO);
  if(!d) return '';
  var n = parseInt(prazo);
  if(isNaN(n) || n < 1) return '';
  if(tipo === 'corridos'){
    d.setDate(d.getDate() + n);
    return dISO(proxUtil(d));
  }
  // dias úteis Art.219
  var count = 0;
  d.setDate(d.getDate()+1); // começa no dia seguinte
  while(count < n){
    if(isUtil(d)) count++;
    if(count < n) d.setDate(d.getDate()+1);
  }
  return dISO(proxUtil(d));
}

function diasRestantes(finalISO){
  if(!finalISO) return null;
  var hoje = new Date();
  var hojeISO = dISO(hoje);
  var f = parseISO(finalISO);
  if(!f) return null;
  // conta dias úteis entre hoje e prazo final
  var sign = 1;
  var a, b;
  if(hojeISO <= finalISO){ a = hoje; b = f; }
  else { a = f; b = hoje; sign = -1; }
  var cnt = 0;
  var cur = new Date(a.getTime());
  cur.setDate(cur.getDate()+1);
  while(dISO(cur) <= dISO(b)){
    if(isUtil(cur)) cnt++;
    cur.setDate(cur.getDate()+1);
  }
  return sign * cnt;
}

function getBadge(p){
  if(p.status === 'suspenso' || p.status === 'encerrado'){
    return {l: p.status === 'suspenso' ? 'Suspenso' : 'Encerrado', c:'pb-suspenso', d:null};
  }
  if(!p.prazoFinal){
    return {l:'Sem prazo', c:'pb-azul', d:null};
  }
  var d = diasRestantes(p.prazoFinal);
  if(d === null) return {l:'Sem prazo', c:'pb-azul', d:null};
  if(d < 0)  return {l:'Vencido', c:'pb-vencido', d:d};
  if(d <= 2)  return {l: d + ' dia(s)', c:'pb-vermelho', d:d};
  if(d <= 5)  return {l: d + ' dias', c:'pb-laranja', d:d};
  if(d <= 8)  return {l: d + ' dias', c:'pb-amarelo', d:d};
  if(d <= 12) return {l: d + ' dias', c:'pb-verde', d:d};
  return {l: d + ' dias', c:'pb-azul', d:d};
}

function fmt(s){
  if(!s) return '–';
  var p = s.split('-');
  return p[2]+'/'+p[1]+'/'+p[0];
}

// ============================================================
// STORAGE
// ============================================================
var STORE_KEY = 'emlurb_v2';

function loadAll(){
  try{
    var raw = localStorage.getItem(STORE_KEY);
    if(!raw) return [];
    return JSON.parse(raw);
  } catch(e){ return []; }
}

function saveAll(arr){
  localStorage.setItem(STORE_KEY, JSON.stringify(arr));
}

function getOne(id){
  var arr = loadAll();
  for(var i=0;i<arr.length;i++){ if(arr[i].id===id) return arr[i]; }
  return null;
}

function upsert(p){
  var arr = loadAll();
  var found = false;
  for(var i=0;i<arr.length;i++){
    if(arr[i].id===p.id){ arr[i]=p; found=true; break; }
  }
  if(!found) arr.push(p);
  saveAll(arr);
}

function remove(id){
  var arr = loadAll();
  var novo = [];
  for(var i=0;i<arr.length;i++){ if(arr[i].id!==id) novo.push(arr[i]); }
  saveAll(novo);
}

function gerarId(){
  var s='';
  var chars='0123456789abcdef';
  for(var i=0;i<32;i++) s+=chars[Math.floor(Math.random()*16)];
  return s.substr(0,8)+'-'+s.substr(8,4)+'-4'+s.substr(13,3)+'-'+s.substr(16,4)+'-'+s.substr(20);
}

// ============================================================
// NAVEGAÇÃO DE TABS
// ============================================================
function tab(name){
  document.getElementById('view-dash').style.display  = name==='dash'  ? '' : 'none';
  document.getElementById('view-lista').style.display = name==='lista' ? '' : 'none';
  document.getElementById('tab-dash').className  = 'tab' + (name==='dash'  ? ' active' : '');
  document.getElementById('tab-lista').className = 'tab' + (name==='lista' ? ' active' : '');
  if(name==='dash')  renderDash();
  if(name==='lista') renderLista();
}

// ============================================================
// DASHBOARD
// ============================================================
function renderDash(){
  var arr = loadAll();
  var total=0, ativos=0, exito=0, derrota=0, acordo=0, hon=0;
  var urgentes=[];

  for(var i=0;i<arr.length;i++){
    var p=arr[i];
    total++;
    if(p.status==='ativo') ativos++;
    if(p.resultado==='exito') exito++;
    if(p.resultado==='derrota') derrota++;
    if(p.resultado==='acordo') acordo++;
    if(p.honorarios) hon++;
    if(p.status==='ativo' && p.prazoFinal){
      var d=diasRestantes(p.prazoFinal);
      if(d!==null && d<=5) urgentes.push(p);
    }
  }

  var kpis = document.getElementById('kpis');
  kpis.innerHTML =
    kpiBox(total,'Total de Processos') +
    kpiBox(ativos,'Processos Ativos') +
    kpiBox(exito,'Êxitos','#0f5132','#d1e7dd') +
    kpiBox(derrota,'Derrotas','#842029','#f8d7da') +
    kpiBox(acordo,'Acordos','#664d03','#fff3cd') +
    kpiBox(hon,'Hon. Êxito Pendentes','#7d3a00','#ffe5d0');

  var hs = document.getElementById('hon-section');
  var html = '';

  if(urgentes.length > 0){
    html += '<div class="section-title">⚠ Prazos Urgentes (≤5 dias úteis)</div>';
    for(var j=0;j<urgentes.length;j++){
      var u=urgentes[j];
      var b=getBadge(u);
      html += '<div class="hon-card" style="border-color:#dc3545;background:#fff5f5">'+
        '<div><div class="proc">'+esc(u.numeroProcesso)+'</div>'+
        '<div class="parte">'+(u.parteContraria||'')+(u.acao?' – '+esc(u.acao):'')+'</div></div>'+
        '<span class="badge '+b.c+'">'+b.l+'</span>'+
        '</div>';
    }
  }

  var honArr = [];
  for(var k=0;k<arr.length;k++){ if(arr[k].honorarios) honArr.push(arr[k]); }
  if(honArr.length > 0){
    html += '<div class="section-title">💰 Honorários de Êxito Pendentes</div>';
    for(var m=0;m<honArr.length;m++){
      var h=honArr[m];
      html += '<div class="hon-card">'+
        '<div>'+
          '<div class="proc">'+esc(h.numeroProcesso)+'</div>'+
          '<div class="parte">'+(h.parteContraria||'')+'</div>'+
        '</div>'+
        '<button onclick="toggleHon(\''+h.id+'\')">Marcar como executado</button>'+
        '</div>';
    }
  }

  if(html==='') html='<p style="color:#888;margin-top:20px;text-align:center">Nenhum alerta no momento.</p>';
  hs.innerHTML = html;
}

function kpiBox(val,lbl,color,bg){
  var c = color||'#1a3a6b';
  var b = bg||'#fff';
  return '<div class="kpi" style="background:'+b+'">'+
    '<div class="val" style="color:'+c+'">'+val+'</div>'+
    '<div class="lbl">'+lbl+'</div>'+
    '</div>';
}

function toggleHon(id){
  var p=getOne(id);
  if(!p) return;
  p.honorarios=false;
  upsert(p);
  renderDash();
}

// ============================================================
// LISTA
// ============================================================
function renderLista(){
  var arr = loadAll();
  var busca = (document.getElementById('busca').value||'').toLowerCase();
  var fStatus = document.getElementById('filtStatus').value;
  var fUrg = document.getElementById('filtUrgencia').value;

  var filtered = [];
  for(var i=0;i<arr.length;i++){
    var p=arr[i];
    if(busca){
      var hay = (p.numeroProcesso||'') + (p.numeroSEI||'') + (p.parteContraria||'') + (p.acao||'');
      if(hay.toLowerCase().indexOf(busca)<0) continue;
    }
    if(fStatus && p.status !== fStatus) continue;
    var b=getBadge(p);
    if(fUrg && b.c !== fUrg) continue;
    filtered.push(p);
  }

  // ordenar por urgência
  filtered.sort(function(a,b2){
    var ba=getBadge(a), bb=getBadge(b2);
    var order={'pb-vencido':0,'pb-vermelho':1,'pb-laranja':2,'pb-amarelo':3,'pb-verde':4,'pb-azul':5,'pb-suspenso':6};
    var oa = order[ba.c]!==undefined ? order[ba.c] : 5;
    var ob = order[bb.c]!==undefined ? order[bb.c] : 5;
    if(oa!==ob) return oa-ob;
    if(ba.d!==null && bb.d!==null) return ba.d-bb.d;
    return 0;
  });

  var cont = document.getElementById('lista-container');
  if(filtered.length===0){
    cont.innerHTML='<div class="empty">Nenhum processo encontrado.</div>';
    return;
  }

  var rows='';
  for(var j=0;j<filtered.length;j++){
    var p=filtered[j];
    var b=getBadge(p);
    var sus = p.status==='suspenso'||p.status==='encerrado';
    rows += '<tr>'+
      '<td class="'+(sus?'tag-suspenso':'')+'">'+esc(p.numeroProcesso)+'</td>'+
      '<td>'+esc(p.numeroSEI||'')+'</td>'+
      '<td>'+esc(p.parteContraria||'')+'</td>'+
      '<td>'+fmt(p.prazoFinal)+'</td>'+
      '<td><span class="badge '+b.c+'">'+b.l+'</span></td>'+
      '<td>'+esc(p.acao||'')+'</td>'+
      '<td class="acoes">'+
        '<button class="bt-ed" onclick="editar(\''+p.id+'\')">✏ Editar</button>'+
        (p.status==='ativo' ? '<button class="bt-ok" onclick="cumprir(\''+p.id+'\')">✔ Cumprido</button>' : '')+
        '<button class="bt-del" onclick="excluir(\''+p.id+'\')">🗑</button>'+
      '</td>'+
      '</tr>';
  }

  cont.innerHTML =
    '<table>'+
    '<thead><tr>'+
      '<th>Processo</th><th>SEI</th><th>Parte Contrária</th>'+
      '<th>Prazo Final</th><th>Urgência</th><th>Ação</th><th>Ações</th>'+
    '</tr></thead>'+
    '<tbody>'+rows+'</tbody>'+
    '</table>';
}

// ============================================================
// AÇÕES
// ============================================================
function cumprir(id){
  var p=getOne(id);
  if(!p) return;
  p.status='suspenso';
  var now=new Date();
  var quando=pad(now.getDate())+'/'+pad(now.getMonth()+1)+'/'+now.getFullYear();
  p.observacoes=(p.observacoes?p.observacoes+'\n':'')+'[Cumprido em '+quando+']';
  upsert(p);
  renderLista();
}

function excluir(id){
  if(!confirm('Excluir este processo?')) return;
  remove(id);
  renderLista();
}

function editar(id){
  var p=getOne(id);
  if(!p) return;
  abrirModal(p);
}

// ============================================================
// MODAL
// ============================================================
var _editId = null;

function abrirModal(p){
  _editId = p ? p.id : null;
  document.getElementById('modal-titulo').textContent = p ? 'Editar Processo' : 'Novo Processo';
  document.getElementById('fProc').value    = p ? (p.numeroProcesso||'') : '';
  document.getElementById('fSEI').value     = p ? (p.numeroSEI||'') : '';
  document.getElementById('fParte').value   = p ? (p.parteContraria||'') : '';
  document.getElementById('fDisp').value    = p ? (p.dataDisponibilizacao||'') : '';
  document.getElementById('fPrazo').value   = p ? (p.prazo||'') : '';
  document.getElementById('fTipo').value    = p ? (p.tipoPrazo||'uteis') : 'uteis';
  document.getElementById('fStatus').value  = p ? (p.status||'ativo') : 'ativo';
  document.getElementById('fAcao').value    = p ? (p.acao||'') : '';
  document.getElementById('fResultado').value = p ? (p.resultado||'') : '';
  document.getElementById('fHon').checked   = p ? !!p.honorarios : false;
  document.getElementById('fObs').value     = p ? (p.observacoes||'') : '';
  document.getElementById('overlay').className='overlay open';
}

function fecharModal(){
  document.getElementById('overlay').className='overlay';
  _editId=null;
}

function salvar(ev){
  ev.preventDefault();
  var proc = document.getElementById('fProc').value.trim();
  if(!proc){ alert('Informe o número do processo.'); return; }

  var disp   = document.getElementById('fDisp').value;
  var prazo  = document.getElementById('fPrazo').value;
  var tipo   = document.getElementById('fTipo').value;
  var final  = calcFinal(disp, prazo, tipo);

  var p = {
    id:               _editId || gerarId(),
    numeroProcesso:   proc,
    numeroSEI:        document.getElementById('fSEI').value.trim(),
    parteContraria:   document.getElementById('fParte').value.trim(),
    dataDisponibilizacao: disp,
    prazo:            prazo,
    tipoPrazo:        tipo,
    prazoFinal:       final,
    status:           document.getElementById('fStatus').value,
    acao:             document.getElementById('fAcao').value.trim(),
    resultado:        document.getElementById('fResultado').value,
    honorarios:       document.getElementById('fHon').checked,
    observacoes:      document.getElementById('fObs').value.trim()
  };

  upsert(p);
  fecharModal();
  renderLista();
}

// ============================================================
// EXPORTAR / IMPORTAR
// ============================================================
function exportar(){
  var arr = loadAll();
  var json = JSON.stringify(arr, null, 2);
  var a = document.createElement('a');
  a.href = 'data:application/json;charset=utf-8,' + encodeURIComponent(json);
  var now = new Date();
  a.download = 'emlurb_backup_'+now.getFullYear()+pad(now.getMonth()+1)+pad(now.getDate())+'.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}

function importar(ev){
  var file = ev.target.files[0];
  if(!file) return;
  var reader = new FileReader();
  reader.onload = function(e){
    try{
      var data = JSON.parse(e.target.result);
      if(!Array.isArray(data)){ alert('Arquivo inválido.'); return; }
      // se tiver apenas os 3 campos (dados iniciais), mesclar sem sobrescrever existentes
      var existing = loadAll();
      var existMap = {};
      for(var i=0;i<existing.length;i++) existMap[existing[i].id] = true;
      var added=0, updated=0;
      for(var j=0;j<data.length;j++){
        var p=data[j];
        if(!p.id) p.id=gerarId();
        if(existMap[p.id]){ updated++; }
        else { added++; }
        upsert(p);
      }
      alert('Importação concluída!\nAdicionados: '+added+'\nAtualizados: '+updated);
      renderLista();
      renderDash();
    } catch(err){
      alert('Erro ao ler arquivo: '+err.message);
    }
  };
  reader.readAsText(file);
  ev.target.value='';
}

// ============================================================
// HELPERS
// ============================================================
function esc(s){
  if(!s) return '';
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

// fechar modal clicando fora
document.getElementById('overlay').addEventListener('click', function(e){
  if(e.target===this) fecharModal();
});

// ============================================================
// INIT
// ============================================================
try {
  renderDash();
} catch(e) {
  document.body.innerHTML = '<div style="padding:30px;font-family:monospace;font-size:14px;background:#fff3cd;border:2px solid #f00;margin:20px;border-radius:8px"><b>ERRO JS (Safari Debug):</b><br>' + e.message + '<br><pre>' + e.stack + '</pre></div>';
}
